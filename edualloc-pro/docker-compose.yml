version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    environment:
      - APP_ENV=development
      - PORT=8080
      - WORKERS=1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
